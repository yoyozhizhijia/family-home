services:
  - type: web
    name: family-home
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3000"
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: SITE_URL
        sync: false  # 部署后手动填入 Render 分配的域名
      - key: WECHAT_TOKEN
        value: <你的Token>
      - key: WECHAT_APP_ID
        value: <你的AppID>
      - key: WECHAT_APP_SECRET
        sync: false  # 包含密钥，手动填入
      - key: WECHAT_ENCODING_AES_KEY
        value: ""
      - key: ADMIN_USERNAME
        value: admin
      - key: ACCESS_PASSWORD
        sync: false  # 包含密码，手动填入
